# defaults used for training POSSM
# this file needs to be combined with a model config and a dataset config

# Paths
data_root: ./data/processed/
log_dir: ./logs

# Transforms
train_transforms: []
eval_transforms: []

# Training
epochs: 1000
batch_size: 128
eval_epochs: 1
eval_batch_size: null  # if null, will use batch_size
seed: 42  # use to set random seed
sanity_check_validation: false

optim:
  base_lr: 3.125e-5  # scaled linearly by batch size
  weight_decay: 1e-4
  lr_decay_start: 0.5

# Logging
wandb:
  enable: true
  entity: null
  project: possm
  run_name: null
  log_model: false

# GPU and CPU
precision: 32
nodes: 1
gpus: 1
num_workers: 4

# Checkpointing
ckpt_path: null  # for resuming training, or loading a model during finetuning
