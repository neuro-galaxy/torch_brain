defaults:
  - defaults.yaml
  - model: calcium_poyo_plus.yaml
  - dataset: calcium_poyo_plus.yaml
  - _self_  # ensures current config overrides defaults

epochs: 2000
batch_size: 512

train_transforms:
  - _target_: torch_brain.transforms.UnitDropout
    field: "calcium_traces.df_over_f"
    min_units: 10
    mode_units: 50
    max_units: 300
    tail_right: 100

wandb:
  run_name: calcium_poyo_plus_full
  