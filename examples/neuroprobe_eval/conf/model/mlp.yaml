# Multi-Layer Perceptron model (PyTorch)
name: mlp
requires_aligned_channels: true
hidden_dims: [128, 128]
batch_size: 200
learning_rate: 0.0001
max_iter: 100
patience: 10
tol: 1e-8
random_state: 42
# Device: 'auto' (default, auto-detect), 'cuda', 'cpu', or specific device like 'cuda:0'
device: auto
requires_coords: false  # Optional; set true only for models that require channel coordinates
