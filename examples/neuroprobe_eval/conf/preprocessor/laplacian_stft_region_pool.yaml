# DS-DM-compatible Laplacian STFT chain with mandatory region-intersection pooling.
name: laplacian_stft_region_pool
chain:
  - name: laplacian_rereference
    remove_non_laplacian: false

  - name: channel_subselect
    allowed_electrodes: null
    subject: null

  - name: stft
    nperseg: 512
    poverlap: 0.75
    window: hann
    max_frequency: 150
    min_frequency: 0
    sampling_rate: 2048
    normalizing: none

  - name: region_intersection_pool
    # Brain-area source key is configured at dataset.brain_area_key.

  - name: standardize
    mode: per_channel_feature
