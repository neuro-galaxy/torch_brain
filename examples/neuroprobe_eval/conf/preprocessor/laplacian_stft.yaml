# Laplacian STFT followed by optional channel selection and standardization.
name: laplacian_stft
chain:
  - name: laplacian_rereference
    remove_non_laplacian: false
  - name: channel_subselect
    # Either provide a list of labels or a JSON file containing a list
    # allowed_electrodes: ["T1b1", "T1b2"]
    # allowed_electrodes: /path/to/clean_laplacian.json
    allowed_electrodes: null
    subject: null
  - name: stft
    nperseg: 512
    poverlap: 0.75
    window: hann
    max_frequency: 150
    min_frequency: 0
    sampling_rate: 2048
    normalizing: none
    # freq_channel_cutoff: 0  # If > 0, use bin-based cutoff instead of Hz-based filtering. 0 = disabled (use Hz-based filtering)
  - name: standardize
    mode: per_channel_feature  # Default mode (variable-channel)
    # Options: per_channel_feature (default) | per_channel_samples_time_pooled
