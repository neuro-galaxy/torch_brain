name: Benchmarks

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - torch_brain/data/**
      - pyproject.toml
      - scripts/data_benchmarks/**
      - .github/workflows/benchmarks.yml

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  compare-with-base:
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install package and dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Fetch base branch
        run: git fetch origin "$BASE_REF"

      - name: Run benchmark comparison (base vs PR HEAD)
        id: benchmark
        run: |
          set -o pipefail
          uv run python scripts/data_benchmarks/compare.py "origin/$BASE_REF" HEAD | tee benchmark-report.txt

      - name: Upsert PR benchmark comment
        if: ${{ !cancelled() && hashFiles('benchmark-report.txt') != '' }}
        uses: actions/github-script@v7
        env:
          BENCHMARK_REPORT_PATH: benchmark-report.txt
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- benchmark-ci-report -->";
            const reportPath = process.env.BENCHMARK_REPORT_PATH;
            const baseRef = process.env.BASE_REF;
            const report = fs.readFileSync(reportPath, "utf8");

            const body = `${marker}
            ## Benchmark comparison vs ${baseRef}

            Baseline: \`origin/${baseRef}\`
            Target: \`HEAD\`

            \`\`\`text
            ${report}
            \`\`\`
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 100,
              }
            );

            const existing = comments.find(
              (comment) =>
                comment.user.type === "Bot" &&
                comment.body &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
