name: Linting

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - uses: astral-sh/ruff-action@v3
      with:
        args: "check"
    - uses: astral-sh/ruff-action@v3
      with:
        args: "format --check"
