name: Type Checking

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project
        run: |
          uv venv venv -p 3.10
          source venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run ty
        run: |
          source venv/bin/activate
          ty check --output-format github
